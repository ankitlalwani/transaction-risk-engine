spring:
  application:
    name: transaction-ingestion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/riskpulse
    username: riskpulse_user
    password: riskpulse_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 5

    consumer:
      group-id: transaction-ingestion-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer


riskpulse:
  kafka:
    topics:
      transaction-created: transaction.created.v1
