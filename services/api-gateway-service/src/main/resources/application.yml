server:
  port: 8088

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - http://localhost:*
                  - http://127.0.0.1:*
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers: '*'
          routes:
            - id: transaction-ingestion-service
              uri: ${TRANSACTION_INGESTION_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/v1/transactions,/api/v1/transactions/**
              filters:
                - RewritePath=/api/v1/transactions(?<segment>/?.*), /api/transactions$\{segment}
            - id: risk-engine-service
              uri: ${RISK_ENGINE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/risk-decisions,/api/v1/risk-decisions/**
            - id: alert-service
              uri: ${ALERT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/alerts,/api/v1/alerts/**
            - id: ai-explanation-service
              uri: ${AI_EXPLANATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/ai-explanations,/api/v1/ai-explanations/**
            - id: transaction-service-health
              uri: ${TRANSACTION_INGESTION_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/system-health/transaction-service
              filters:
                - SetPath=/actuator/health
            - id: risk-engine-health
              uri: ${RISK_ENGINE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/system-health/risk-engine
              filters:
                - SetPath=/actuator/health
            - id: alert-service-health
              uri: ${ALERT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/system-health/alert-service
              filters:
                - SetPath=/actuator/health
            - id: ai-explanation-service-health
              uri: ${AI_EXPLANATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/system-health/ai-explanation-service
              filters:
                - SetPath=/actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
